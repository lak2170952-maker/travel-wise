<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact – Veteran Support Network</title>
  <meta name="description" content="Contact our team for veteran support services and assistance.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/styles.css">
  <script src="javascript/script.js" defer></script>
</head>

<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="page-wrapper">

<header class="site-header">
  <div class="logo">Veteran Support Network</div>
  <nav aria-label="Main navigation">
    <ul class="nav-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="get-help.html">Get Help</a></li>
      <li><a href="resources.html">Resources</a></li>
      <li><a href="policy.html">Policy</a></li>
      <li><a href="contact.html" aria-current="page">Contact</a></li>
    </ul>
  </nav>
</header>

<main id="main-content" class="section">
  <h1>Contact Us</h1>
  <p>If you are a veteran seeking assistance or someone who wants to support our mission, please reach out using the form below.</p>

  <form id="contact-form" class="contact-form" onsubmit="return handleContactSubmit(event);">
    <div>
      <label for="name">Name*</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div>
      <label for="email">Email*</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div>
      <label for="role">I am a...</label>
      <select id="role" name="role">
        <option value="veteran">Veteran</option>
        <option value="family">Family Member</option>
        <option value="supporter">Supporter</option>
      </select>
    </div>

    <div>
      <label for="message">How can we help?*</label>
      <textarea id="message" name="message" rows="4" required></textarea>
    </div>

    <button type="submit" class="btn primary">Send Message</button>
    <p id="form-feedback" class="form-feedback" aria-live="polite"></p>
  </form>
</main>

<footer class="site-footer">
  <p>&copy; <span class="year-copy"></span> Veteran Support Network.</p>
</footer>

</div>
</body>
</html>
